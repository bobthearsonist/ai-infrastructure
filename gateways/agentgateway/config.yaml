# Top-level config settings
config:
  adminAddr: '0.0.0.0:15000'
  tracing:
    otlpEndpoint: http://host.docker.internal:4317
    randomSampling: true

binds:
  - port: 3847
    listeners:
      - name: mcp-gateway
        routes:
          - name: mcp-tools
            policies:
              cors:
                allowOrigins:
                  - '*'
                allowHeaders:
                  - '*'
            backends:
              # Backend 1: SSE-proxied stdio MCPs (stateless - auto-reinitializes sessions)
              - mcp:
                  statefulMode: stateless
                  targets:
                    - name: sequential-thinking
                      sse:
                        host: http://agentgateway-stdio-proxy:7030/servers/sequential-thinking/sse
                    - name: memory
                      sse:
                        # Use the hyphen alias — agentgateway's strict DNS
                        # resolver rejects underscores per RFC 1035.
                        host: http://memory-mcp:7040/servers/memory/sse
                    - name: kapture
                      sse:
                        host: http://agentgateway-stdio-proxy:7030/servers/kapture/sse
                    # Qdrant RAG (standalone container - multi-collection)
                    - name: qdrant-notes-work
                      sse:
                        host: http://qdrant-mcp:7020/servers/qdrant-notes-work/sse
                    - name: qdrant-code-work
                      sse:
                        host: http://qdrant-mcp:7020/servers/qdrant-code-work/sse
                    - name: qdrant-code-public
                      sse:
                        host: http://qdrant-mcp:7020/servers/qdrant-code-public/sse
                    - name: context7
                      mcp:
                        host: http://context7-mcp:7008/mcp
                    - name: playwright
                      sse:
                        host: http://host.docker.internal:7007/sse
                    - name: browser-use
                      sse:
                        host: http://host.docker.internal:7011/sse
                    - name: hass-mcp
                      sse:
                        host: http://agentgateway-stdio-proxy:7030/servers/hass-mcp/sse
                    # TODO: azure-devops — not yet configured in stdio-proxy/servers.home.json.
                    # Enabling this target without a matching servers.json entry makes
                    # stdio-proxy 404 on /servers/azure-devops/sse, which aborts the
                    # entire multiplex init for ALL targets. Add the uvx/npx invocation
                    # for the azure-devops MCP to servers.home.json first, then uncomment.
                    # - name: azure-devops
                    #   sse:
                    #     host: http://agentgateway-stdio-proxy:7030/servers/azure-devops/sse

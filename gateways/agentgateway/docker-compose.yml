name: agentgateway

include:
  - path: ../../mcps/stdio-proxy/docker-compose.yml

services:
  # Extend the included stdio-proxy to also reach ai-shared services
  # (e.g. kapture-server). We give this stdio-proxy instance an explicit
  # `agentgateway-stdio-proxy` alias on the private `default` network — DO
  # NOT rely on the bare `stdio-proxy` service-name alias, because Docker
  # auto-creates that alias on EVERY network the container attaches to,
  # including ai-shared, where it collides with the mcpx- and standalone-
  # owned stdio-proxy instances. Docker DNS does not deterministically
  # prefer the locally-attached network, so a `stdio-proxy:7030` lookup
  # from agentgateway can return any of the three. config.yaml uses
  # `agentgateway-stdio-proxy:7030` to make routing unambiguous.
  # The /local-pypi mount mirrors the standalone stdio-proxy override so
  # psmcp (photoshop) can find its package index — `include:` doesn't pull
  # override.yml in.
  stdio-proxy:
    networks:
      default:
        aliases:
          - agentgateway-stdio-proxy
      ai-shared:
    volumes:
      - ~/.local-pypi:/local-pypi:ro

  # agentgateway - MCP Gateway/Proxy
  agentgateway:
    image: ghcr.io/agentgateway/agentgateway:latest
    container_name: agentgateway
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3847:3847" # MCP endpoint
      - "15001:15000" # UI (internal 15000 -> external 15001)
      - "15020:15020" # Metrics (Prometheus)
    environment:
      - RUST_LOG=debug
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ./memory.json:/config/memory.json
    command: ["-f", "/config/config.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 127.0.0.11  # Docker embedded DNS
    networks:
      - default        # Private network for stdio-proxy
      - ai-shared      # Shared network for other MCP services

  # Debug sidecar for troubleshooting network connectivity
  debug:
    image: nicolaka/netshoot:latest
    container_name: agentgateway-debug
    profiles: ["debug"]  # Only starts with: docker compose --profile debug up -d debug
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ai-shared
    command: ["sleep", "infinity"]

  # NGINX SSL/WebSocket Proxy
  nginx-proxy:
    image: nginx:alpine
    container_name: agentgateway-proxy
    restart: unless-stopped
    ports:
      - "3443:3443" # HTTPS MCP endpoint
      - "15443:15443" # HTTPS UI
      - "9223:9223" # Chrome DevTools Protocol proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/cert.pem:/etc/ssl/certs/cert.pem:ro
      - ./certs/key.pem:/etc/ssl/private/key.pem:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - agentgateway
    networks:
      - default        # Can reach agentgateway on private network

networks:
  default:
    # Private network for stdio-proxy (included service)
    # Each stack gets its own default network to prevent DNS collisions
  ai-shared:
    name: ai-shared
    external: true

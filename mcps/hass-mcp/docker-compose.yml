name: hass-mcp

services:
  hass_mcp_proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hass-mcp-proxy
    command:
      [
        '--port',
        '7010',
        '--host',
        '0.0.0.0',
        '--pass-environment',
        '--',
        'docker',
        'run',
        '-i',
        '--rm',
        '--network=ai-shared',
        '--label=com.docker.compose.project=hass-mcp',
        '--label=com.docker.compose.service=hass_mcp_server',
        '--name=hass-mcp-server',
        '-e',
        'HA_URL',
        '-e',
        'HA_TOKEN',
        '-e',
        'AUTO_APPROVE',
        'voska/hass-mcp:latest',
      ]
    ports:
      - '7010:7010'
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # mcp-proxy zombie-state guard: the HTTP /status endpoint returns 200 even
    # when the inner `docker run voska/hass-mcp` subprocess has died, because
    # mcp-proxy keeps the SSE server alive in a degraded state instead of
    # crashing. Without the pgrep check, Docker keeps the proxy "healthy"
    # forever and `restart: unless-stopped` never triggers. pgrep -P 1 confirms
    # PID 1 (mcp-proxy) still has its `docker` child — when that child dies,
    # healthcheck fails, container restarts, fresh subprocess spawns.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7010/status >/dev/null && pgrep -P 1 docker >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ai-infrastructure

networks:
  ai-infrastructure:
    name: ai-shared
    external: true

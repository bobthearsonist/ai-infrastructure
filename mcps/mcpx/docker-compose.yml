name: mcpx

include:
  - path: ../../mcps/stdio-proxy/docker-compose.yml

services:
  # Extend the included stdio-proxy to also reach ai-shared services
  # (e.g. kapture-server). The private `default` network stays primary so
  # `stdio-proxy` hostname resolves locally for mcpx, avoiding the
  # cross-stack DNS collision that commit 6e7fc82 fixed. The /local-pypi
  # mount mirrors the standalone stdio-proxy override so psmcp (photoshop)
  # can find its package index — `include:` doesn't pull override.yml in.
  stdio-proxy:
    networks:
      - default
      - ai-shared
    volumes:
      - ~/.local-pypi:/local-pypi:ro

  # MCPX Gateway - MCP Proxy Server
  # https://docs.lunar.dev/mcpx/architecture
  # Changelog: https://github.com/TheLunarCompany/lunar/blob/main/mcpx/CHANGELOG.md
  mcpx:
    image: us-central1-docker.pkg.dev/prj-common-442813/mcpx/mcpx:latest
    container_name: mcpx
    restart: unless-stopped
    privileged: true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "9000:9000" # MCPX API port (SSE + streamable HTTP)
      - "5173:5173" # Control Plane UI port
      - "9001:9001" # Internal webserver port
      - "3100:3000" # Metrics port (remapped from 3000 - conflict with other service)
    volumes:
      - ./:/lunar/packages/mcpx-server/config
      - ${MCP_CONFIG}:/lunar/packages/mcpx-server/config/mcp.json:ro
      - ${CUSTOM_CA_CERT:-/dev/null}:/usr/local/share/ca-certificates/custom-ca.pem:ro
    environment:
      - NODE_EXTRA_CA_CERTS=${CUSTOM_CA_CERT:+/usr/local/share/ca-certificates/custom-ca.pem}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      stdio-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default        # Private network for stdio-proxy
      - ai-shared      # Shared network for other MCP services

  # Lunar Proxy - API Gateway (optional, for rate limiting / observability)
  lunar-proxy:
    image: lunarapi/lunar-proxy:latest
    container_name: lunar-proxy
    restart: unless-stopped
    ports:
      - "8000:8000" # Main proxy port
      - "8040:8040" # Health check port
      - "8081:8081" # Admin port
    volumes:
      - ./:/etc/lunar-proxy
    environment:
      - TENANT_NAME=ORGANIZATION
      - LUNAR_API_KEY=8adb1fcd-30dd-4a99-ada4-653f2be8c225
      - LOG_LEVEL=ERROR
      - LUNAR_MANAGED=false
      - LUNAR_TELEMETRY=true
    networks:
      - ai-shared

  # NGINX SSL Proxy
  nginx-ssl:
    image: nginx:alpine
    container_name: mcpx-ssl-proxy
    restart: unless-stopped
    ports:
      - "9443:9443" # HTTPS MCPX API port
      - "5443:5443" # HTTPS Control Plane UI port
      - "9222:9222" # Chrome DevTools Protocol proxy port
      # Kapture WebSocket (61822) is now served by the kapture-server container
      # in mcps/kapture/docker-compose.yml — do NOT publish it here.
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/tls/cert.pem:/etc/ssl/certs/cert.pem:ro
      - ./certs/tls/key.pem:/etc/ssl/private/key.pem:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro # Disable default config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mcpx:
        condition: service_healthy
    networks:
      - default        # Can reach mcpx on private network

networks:
  default:
    # Private network for stdio-proxy (included service)
    # Each stack gets its own default network to prevent DNS collisions
  ai-shared:
    external: true

name: stdio-proxy

services:
  # Stateless stdio MCP proxy - included per-stack via compose include:
  # Referenced by container name (stdio_proxy) on the shared network
  stdio-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "7030"
      - "61822"  # Kapture WebSocket bridge
    volumes:
      - ${SERVERS_CONFIG:-./servers.json}:/config/servers.json:ro
    env_file:
      # Per-machine secrets for any named server that needs env (e.g. hass-mcp
      # needs HA_URL + HA_TOKEN, propagated via --pass-environment). Optional;
      # if the file doesn't exist, set ENV_FILE_PATH or remove this entry.
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # Disable IPv6 in the container's network namespace. The MCPs hosted
    # here make outbound HTTPS via Python (urllib3/requests), which does
    # NOT do happy-eyeballs fallback. The Docker bridge has no IPv6 route,
    # so AAAA-only resolver answers (e.g. login.microsoftonline.com) would
    # otherwise produce "Errno 101 Network unreachable" before urllib3
    # walks through to an A record.
    #
    # NOTE: getaddrinfo still returns AF_INET6 entries (the resolver does
    # not consult this sysctl) — what saves us is that AF_INET6 socket()
    # / connect() fails immediately, so urllib3's retry loop reaches an
    # IPv4 entry without a slow timeout. We do NOT also set
    # RES_OPTIONS=no-aaaa here: this image is musl libc (Alpine), which
    # ignores it. If the proxy ever switches to a glibc base image,
    # adding it would skip AAAA queries entirely, saving DNS round trips.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    healthcheck:
      # mcp-proxy only starts listening AFTER all MCPs are initialized
      # So if /status responds, the MCPs are ready
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7030/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s  # Allow time for npx + uv to download packages on first run

  # Lightweight status logger - polls MCP proxy /status endpoint every 30s
  # Provides real-time health visibility via logs (docker compose logs -f mcp-status)
  mcp-status:
    image: alpine:latest
    restart: unless-stopped
    depends_on:
      stdio-proxy:
        condition: service_healthy
    volumes:
      - ${SERVERS_CONFIG:-./servers.json}:/config/servers.json:ro
    command: >
      sh -c '
      apk add --no-cache -q jq >/dev/null 2>&1;
      while true; do
        response=$$(wget -qO- --timeout=5 http://stdio-proxy:7030/status 2>/dev/null);
        if [ -z "$$response" ]; then
          echo "[mcp-status] ⚠️  proxy unreachable";
        else
          status="[mcp-status]";
          for name in $$(echo "$$response" | jq -r ".server_instances | keys[]"); do
            state=$$(echo "$$response" | jq -r ".server_instances[\"$$name\"]");
            if [ "$$state" = "configured" ]; then
              status="$$status ✅ $$name";
            else
              status="$$status ❌ $$name ($$state)";
            fi;
          done;
          echo "$$status";
        fi;
        sleep 30;
      done
      '

# NOTE: adb-proxy runs separately from mcps/adb-mcp/docker-compose.yml
# Start it with: cd ../adb-mcp && docker-compose up -d adb-proxy
# 
# Network: When included by a parent compose file, this service will join
# the parent's default network (private to that stack). This prevents DNS
# collisions when multiple stacks include stdio-proxy.

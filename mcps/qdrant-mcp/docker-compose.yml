name: qdrant-mcp

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    # Vectors+HNSW are on_disk (see collection config), so RSS is the hot
    # working set + payload cache, not the full 3.7GB store. 3g leaves room
    # for the optimizer's segment-rewrite spikes during indexing.
    mem_limit: 3g
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ['CMD-SHELL', 'timeout 5 bash -c "cat < /dev/null > /dev/tcp/localhost/6333" || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-infrastructure

  # Qdrant RAG MCP Server - Semantic search via Qdrant + FastEmbed
  # Standalone container (Debian-based) because onnxruntime requires glibc
  qdrant-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qdrant-mcp
    restart: unless-stopped
    # Runs 4 mcp-server-qdrant processes, each loading its own MiniLM model
    # (~250MB resident → ~1g aggregate at idle). 2g leaves headroom for ONNX
    # arena spikes during concurrent query embedding so we don't OOM-kill.
    mem_limit: 2g
    ports:
      - '7020:7020'
    volumes:
      - ${QDRANT_MCP_CONFIG:-./servers.json}:/config/servers.json:ro
      - fastembed-cache:/root/.cache/fastembed
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:7020/status\")" || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure

  # Obsidian vault indexer (CPU - fast enough for markdown)
  # One-shot: run manually via `docker compose --profile obsidian up obsidian-indexer`
  obsidian-indexer:
    build:
      context: ./indexer
      target: cpu
    container_name: obsidian-indexer
    mem_limit: 2g
    command: ["python", "index_obsidian.py", "--config", "/app/indexer.yaml"]
    volumes:
      - ${VAULT_PATH:-/nonexistent}:/vault:ro
      - ./indexer/indexer.yaml:/app/indexer.yaml:ro
      - ./indexer/.index_state.json:/app/.index_state.json
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure
    profiles:
      - obsidian

  # Obsidian vault watcher (long-running sidecar)
  # Polls /vault for .md changes, debounces, invokes index_obsidian.py.
  # PollingObserver is required because Docker Desktop on Windows + WSL2
  # does not propagate inotify across the bind-mount boundary.
  obsidian-watcher:
    build:
      context: ./indexer
      target: cpu
    image: qdrant-mcp-indexer:cpu
    container_name: obsidian-watcher
    restart: unless-stopped
    mem_limit: 1g
    command: ["python", "watcher.py", "--config", "/app/watcher.yaml"]
    volumes:
      - ${VAULT_PATH:-/nonexistent}:/vault:ro
      - ./indexer/indexer.yaml:/app/indexer.yaml:ro
      - ./indexer/watcher-obsidian.yaml:/app/watcher.yaml:ro
      - ./indexer/.index_state.json:/app/.index_state.json
      - fastembed-cache:/root/.cache/fastembed
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure

  # Repository code watcher — WORK (Profisee canonical repos -> code-work)
  # Long-running sidecar, GPU-accelerated. Polls /repos for code/config/doc
  # changes, debounces, invokes index_repos.py against repos-work.yaml.
  # PollingObserver is required because Docker Desktop on Windows + WSL2
  # does not propagate inotify across the bind-mount boundary.
  repo-watcher-work:
    build:
      context: ./indexer
      target: gpu
    image: qdrant-mcp-indexer:gpu
    container_name: repo-watcher-work
    restart: unless-stopped
    mem_limit: 2g
    command: ["python3", "watcher.py", "--config", "/app/watcher.yaml"]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
    volumes:
      - ${REPOS_BASE:-/nonexistent}:/repos:ro
      - ./indexer/repos-work.yaml:/app/repos.yaml:ro
      - ./indexer/watcher-repos.yaml:/app/watcher.yaml:ro
      - ./indexer/.index_repos_state_work.json:/app/.index_repos_state_work.json
      - fastembed-cache:/root/.cache/fastembed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure

  # Repository code watcher — PUBLIC (bobthearsonist personal repos -> code-public)
  # Same image as repo-watcher-work but mounts repos-public.yaml and uses
  # a distinct lockfile path so the two watchers can run side-by-side.
  repo-watcher-public:
    build:
      context: ./indexer
      target: gpu
    image: qdrant-mcp-indexer:gpu
    container_name: repo-watcher-public
    restart: unless-stopped
    mem_limit: 2g
    command: ["python3", "watcher.py", "--config", "/app/watcher.yaml"]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
    volumes:
      - ${REPOS_BASE:-/nonexistent}:/repos:ro
      - ./indexer/repos-public.yaml:/app/repos.yaml:ro
      - ./indexer/watcher-repos-public.yaml:/app/watcher.yaml:ro
      - ./indexer/.index_repos_state_public.json:/app/.index_repos_state_public.json
      - fastembed-cache:/root/.cache/fastembed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure

  # One-shot repository indexer (GPU-accelerated embedding).
  # Mounts the work repos config by default; override REPOS_CONFIG to
  # point at repos-public.yaml for an on-demand public reindex.
  # Usage: `docker compose --profile repos run repo-indexer`
  repo-indexer:
    build:
      context: ./indexer
      target: gpu
    container_name: repo-indexer
    mem_limit: 3g
    command: ["python3", "index_repos.py", "--config", "/app/repos.yaml"]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${REPOS_BASE:-/nonexistent}:/repos:ro
      - ./indexer/${REPOS_CONFIG:-repos-work.yaml}:/app/repos.yaml:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai-infrastructure
    profiles:
      - repos

volumes:
  qdrant-data:
  fastembed-cache:

networks:
  ai-infrastructure:
    name: ai-shared
    external: true

services:
  # Watchtower - Automatic Docker image updates
  # https://containrrr.dev/watchtower/
  # Only updates containers with com.centurylinklabs.watchtower.enable=true label
  # Polls every 24 hours and cleans up old images after updating
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=logger://

networks:
  default:
    name: mcpx_ai-infrastructure
    external: true

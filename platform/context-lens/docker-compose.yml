# Context Lens + mitmproxy
# Intercepts LLM API traffic and visualizes context window composition.
#
# Usage:
#   docker compose up -d
#   Open http://localhost:4041
#
# Ports:
#   4040 - Context Lens proxy (base URL override for Claude Code, Aider, etc.)
#   4041 - Context Lens web UI + ingest API
#   8080 - mitmproxy forward proxy (HTTPS interception for OpenCode, VS Code Copilot, etc.)
#
# Data is persisted to ~/.context-lens/data via volume mount.

services:
  context-lens:
    image: node:22-slim
    container_name: context-lens
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command:
      - |
        npm install -g context-lens@latest 2>&1 | tail -1
        echo "Starting context-lens standalone (proxy + web UI)..."
        npx context-lens --no-open
    ports:
      - "4040:4040"
      - "4041:4041"
    volumes:
      - ${CONTEXT_LENS_DATA:-~/.context-lens/data}:/root/.context-lens/data
    environment:
      CONTEXT_LENS_BIND_HOST: "0.0.0.0"
      CONTEXT_LENS_MAX_SESSIONS: "1000"
      NODE_OPTIONS: "--max-old-space-size=8192"
    deploy:
      resources:
        limits:
          memory: 10g
    healthcheck:
      # Verify both the reverse proxy (4040) and the web UI / ingest API (4041)
      # are functional. These are separate Node processes — one can crash while
      # the other lives, so both must be checked.
      test: ["CMD-SHELL", "node -e \"Promise.all([fetch('http://localhost:4041').then(r=>{if(!r.ok)throw r.status}),new Promise((y,n)=>{const s=require('net').createConnection(4040,'localhost',()=>{s.end();y()});s.on('error',n);s.setTimeout(2000,()=>{s.destroy();n()})})]).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 30s
      retries: 3
      start_period: 30s

  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: context-lens-mitmproxy
    restart: unless-stopped
    # Startup ordering only — mitmproxy does not require context-lens to be
    # healthy. The addon POSTs captures to the ingest API; failures are logged
    # and the intercepted traffic still flows to upstream APIs unaffected.
    depends_on:
      context-lens:
        condition: service_started
    entrypoint: ["mitmdump"]
    command:
      - "-s"
      - "/addon/mitm_addon.py"
      - "--quiet"
      - "--listen-port"
      - "8080"
      # Docker-mapped connections appear from the bridge IP, not loopback.
      # mitmproxy 12+ blocks "global" client IPs by default, which kills all
      # proxied traffic from the host. Disable that since this container is
      # only reachable via the host's :8080 port mapping anyway.
      - "--set"
      - "block_global=false"
    ports:
      - "8080:8080"
    volumes:
      - ./mitm_addon.py:/addon/mitm_addon.py:ro
      - ${MITMPROXY_CERTS:-~/.mitmproxy}:/home/mitmproxy/.mitmproxy
    environment:
      CONTEXT_LENS_INGEST_URL: "http://context-lens:4041/api/ingest"
    healthcheck:
      # Verify mitmdump is accepting connections on the forward proxy port.
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

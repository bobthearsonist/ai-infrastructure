# Dev overlay — mounts local source for hot-reload development.
#
# Usage:
#   CONTEXT_LENS_SRC=/c/Repositories/context-lens docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d context-lense
#
# Or create a .env file:
#   CONTEXT_LENS_SRC=/c/Repositories/context-lens
#
# Ports:
#   4040 - Proxy
#   4041 - Analysis API
#   5175 - Vite dev server (UI hot-reload, remapped from 5173)

volumes:
  context-lens-node-modules:
  context-lens-ui-node-modules:

services:
  context-lens:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: context-lens-dev
    volumes:
      - ${CONTEXT_LENS_SRC:-.}:/app
      - context-lens-node-modules:/app/node_modules
      - context-lens-ui-node-modules:/app/ui/node_modules
      - ${CONTEXT_LENS_DATA:-~/.context-lens/data}:/root/.context-lens/data
    ports:
      - "5175:5173"
    environment:
      CONTEXT_LENS_BIND_HOST: "0.0.0.0"
      CONTEXT_LENS_MAX_SESSIONS: "${CONTEXT_LENS_MAX_SESSIONS:-1000}"
      NODE_OPTIONS: "--max-old-space-size=8192"
    deploy:
      resources:
        limits:
          memory: 10g
    healthcheck:
      # Build from source (~30s subsequent, ~2 min first) + session data
      # loading (~2-3 min) before the analysis server binds port 4041.
      start_period: 420s
    command:
      - |
        # --- Wait for bind mount to become ready ---
        timeout=30; elapsed=0
        while [ ! -f /app/package.json ]; do
          elapsed=$$((elapsed + 1))
          if [ "$$elapsed" -ge "$$timeout" ]; then
            echo "FATAL: /app/package.json not found after $${timeout}s — is CONTEXT_LENS_SRC mounted?" >&2
            exit 1
          fi
          [ "$$((elapsed % 5))" -eq 0 ] && echo "Waiting for source mount... ($${elapsed}/$${timeout}s)"
          sleep 1
        done
        echo "Source mount ready."

        # --- Install and build (fast on subsequent runs — named volumes persist node_modules) ---
        set -e
        pnpm install --ignore-scripts
        cd ui && pnpm install && cd ..
        if [ ! -f /app/dist/cli.js ]; then
          echo "Building backend (first run)..."
          pnpm run build
        fi
        if [ ! -f /app/ui/dist/index.html ]; then
          echo "Building UI (first run)..."
          pnpm run build:ui
        fi
        set +e

        # --- Dev servers ---
        concurrently -k -n tsc,srv,ui -c blue,green,magenta \
          "npx tsc --watch --preserveWatchOutput" \
          "nodemon --delay 1 --watch dist dist/cli.js -- --no-open" \
          "cd ui && pnpm dev --host 0.0.0.0"
